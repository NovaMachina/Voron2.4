#   Use PRINT_START for the slicer starting script - please customise for your slicer of choice
[gcode_macro PRINT_START]
gcode:
  {% set TOOL = params.TOOL | default(0) | int %}
  {% set TOOL_TEMP = params.TOOL_TEMP | default(0) | int %}
  {% set BED_TEMP = params.BED_TEMP | default(0) | int %}
  {% set CHAMBER_TEMP = params.CHAMBER | default(0) | int %}
  {% set x_wait = printer.toolhead.axis_maximum.x | float / 2 %}
  {% set y_wait = printer.toolhead.axis_maximum.y | float / 2 %}

  {% if printer.tool_probe_endstop is defined %}
    SET_DISPLAY_TEXT MSG="Disabling crash detection"
    STOP_CRASH_DETECTION
  {% endif %}

  G90                              ; absolute positioning
  M107                             ; turn off part cooling fan
  G28                              ; home all axes

  BED_MESH_CLEAR

  PREHEAT BED={BED_TEMP} CHAMBER={CHAMBER_TEMP} TOOL={TOOL}

  T0                               ; activate T0 before calibration

  SET_DISPLAY_TEXT MSG="QGL"
  CLEAN_NOZZLE
  QUAD_GANTRY_LEVEL
  G28 Z                            ; re-home Z after QGL

  SET_DISPLAY_TEXT MSG="Bed mesh"
  BED_MESH_CALIBRATE ADAPTIVE=1
  CLEAN_NOZZLE

  {% if TOOL > 0 %}
    M104 T0 S0                     ; shut off T0 heater before docking
    T{TOOL}                        ; switch to print tool
  {% endif %}

  SET_DISPLAY_TEXT MSG="Hotend: {TOOL_TEMP}c"
  G1 X{x_wait} Y{y_wait} Z15 F9000  ; move to bed center while heating
  M109 T{TOOL} S{TOOL_TEMP}                ; wait for print tool to reach temp

  CLEAN_NOZZLE

  {% if printer.tool_probe_endstop is defined %}
    SET_DISPLAY_TEXT MSG="Enabling crash detection"
    START_CRASH_DETECTION
  {% endif %}

  SET_DISPLAY_TEXT MSG="Printer goes brr"
